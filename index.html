<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVRA Dashboard</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;}
.nav{display:flex;background:black;color:white;}
.nav div{flex:1;padding:12px;text-align:center;cursor:pointer;}
.section{display:none;padding:20px;}
.active{display:block;}
.box{background:white;padding:15px;margin-bottom:15px;border-radius:10px;}
input,button{width:100%;padding:10px;margin-top:8px;}
.green{color:green;}
.red{color:red;}
</style>
</head>

<body>

<div class="nav">
  <div onclick="show('gen')">Generate</div>
  <div onclick="show('bill')">Billing</div>
  <div onclick="show('erp')">ERP</div>
  <div onclick="show('renew')">Renew</div>
  <div onclick="show('analytics')">Analytics</div>
</div>

<!-- GENERATE -->
<div id="gen" class="section active">
<div class="box">
<input id="gname" placeholder="Customer Name">
<input id="gphone" placeholder="Phone Number">
<button onclick="createCustomer()">Generate Code</button>
<div id="gresult"></div>
</div>
</div>

<!-- BILLING -->
<div id="bill" class="section">
<div class="box">

<h3>Customer Details</h3>
<input id="bname" placeholder="Customer Name">
<input id="bphone" placeholder="Customer Phone">
<div id="custStatus"></div>

<h3>Referral Details</h3>
<input id="code" placeholder="Referral Code">
<div id="referrer"></div>

<h3>Billing</h3>
<input id="amount" placeholder="Bill Amount">
<div id="calc"></div>

<input id="billNo" placeholder="Bill Number">

<button onclick="submitBill()">Submit</button>
<div id="bresult"></div>

</div>
</div>

<!-- ERP -->
<div id="erp" class="section">
<div class="box">
<button onclick="loadERP()">Load Pending</button>
<div id="erpList"></div>
</div>
</div>

<!-- RENEW -->
<div id="renew" class="section">
<div class="box">
<input id="rphone" placeholder="Customer Phone">
<div id="rname"></div>
<button onclick="renew()">Renew Code</button>
<div id="rresult"></div>
</div>
</div>

<!-- ANALYTICS -->
<div id="analytics" class="section">
<div class="box">
<input id="aphone" placeholder="Customer Phone">
<button onclick="getAnalytics()">Check</button>
<div id="aresult"></div>
</div>
</div>

<script>
const URL="PASTE_SCRIPT_URL";

// NAV
function show(id){
document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

// CUSTOMER FETCH
bphone.addEventListener("blur",()=>{
fetch(URL+`?action=getCustomer&phone=${bphone.value}`)
.then(r=>r.json())
.then(r=>{
custStatus.innerHTML=r.status=="Old"
? `Customer: ${r.name} (Old)`
: "New Customer";
});
});

// REFERRER FETCH (NAME + PHONE)
code.addEventListener("blur",()=>{
fetch(URL+`?action=getReferrer&code=${code.value}`)
.then(r=>r.json())
.then(r=>{
referrer.innerHTML=r.status=="Success"
? `Referrer: ${r.name} | ${code.value.split("-")[1]}`
: `<span class="red">Invalid Code</span>`;
});
});

// CALCULATION
amount.addEventListener("input",()=>{
const b=Number(amount.value)||0;
const d=b*0.05;
const n=b-d;
const r=Math.floor(n/5000)*250;
calc.innerHTML=`Discount: ₹${d} | Net: ₹${n} | Reward: ₹${r}`;
});

// SUBMIT BILL
function submitBill(){

if(!bname.value || !bphone.value){
  bresult.innerHTML="<span class='red'>Enter customer name & phone</span>";
  return;
}

fetch(URL,{
method:"POST",
body:JSON.stringify({
referralCode:code.value,
customerName:bname.value,
customerPhone:bphone.value,
billAmount:amount.value,
billNumber:billNo.value
})
})
.then(r=>r.json())
.then(r=>{
bresult.innerHTML=r.status=="Success"
? `<span class="green">Reward ₹${r.reward}<br>New Code:${r.newCustomerCode}</span>`
: `<span class="red">${r.message}</span>`;
});
}

// CREATE CUSTOMER
function createCustomer(){
fetch(URL+`?action=createCustomer&name=${gname.value}&phone=${gphone.value}`)
.then(r=>r.json())
.then(r=>{
gresult.innerHTML=r.code||r.message;
});
}

// ERP
function loadERP(){
fetch(URL+"?action=getERP")
.then(r=>r.json())
.then(data=>{
erpList.innerHTML=data.map(d=>
`Row:${d.row} | ₹${d.reward}
<button onclick="mark(${d.row})">Done</button>`
).join("<br>");
});
}

function mark(row){
fetch(URL+`?action=markERP&row=${row}`).then(()=>loadERP());
}

// RENEW (AUTO NAME)
rphone.addEventListener("blur",()=>{
fetch(URL+`?action=getCustomer&phone=${rphone.value}`)
.then(r=>r.json())
.then(r=>{
rname.innerHTML=r.name || "Customer not found";
});
});

function renew(){
fetch(URL+`?action=renew&phone=${rphone.value}`)
.then(r=>r.json())
.then(r=>{
rresult.innerHTML=r.code||r.message;
});
}

// ANALYTICS
function getAnalytics(){
fetch(URL+`?action=analytics&phone=${aphone.value}`)
.then(r=>r.json())
.then(r=>{
aresult.innerHTML=`Referrals: ${r.totalReferrals} | Rewards: ₹${r.totalRewards}`;
});
}
</script>

</body>
</html>
