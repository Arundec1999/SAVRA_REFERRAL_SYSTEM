<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SAVRA Referral System</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 420px;
      margin: auto;
      background: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }

    h2 {
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #666;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    input:focus {
      border-color: black;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      border: none;
      border-radius: 6px;
      background: black;
      color: white;
      font-weight: bold;
      cursor: pointer;
      font-size: 15px;
    }

    button:hover {
      background: #333;
    }

    .info-box {
      background: #fafafa;
      padding: 10px;
      border-radius: 6px;
      margin-top: 10px;
      font-size: 14px;
    }

    .result {
      margin-top: 15px;
      padding: 12px;
      border-radius: 6px;
      font-size: 14px;
    }

    .success { background: #d4edda; color: #155724; }
    .error { background: #f8d7da; color: #721c24; }

    .loading {
      text-align: center;
      margin-top: 10px;
      display: none;
    }
  </style>

</head>

<body>

<div class="container">
  <h2>SAVRA Referral</h2>
  <div class="subtitle">Enter referral & billing details</div>

  <input id="code" placeholder="Referral Code">
  <input id="name" placeholder="Customer Name">
  <input id="phone" placeholder="Customer Phone (10 digit)">
  <input id="bill" placeholder="Bill Amount (₹)" type="number">
  <input id="billNo" placeholder="Bill Number">

  <div class="info-box" id="calcBox">
    Discount: ₹0 <br>
    Net Amount: ₹0 <br>
    Reward: ₹0
  </div>

<button onclick="submitForm()">Submit</button>

  <div class="loading" id="loading">Processing...</div>
  <div id="result"></div>
</div>

<script>
const SCRIPT_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

// 🔥 Live Calculation
document.getElementById("bill").addEventListener("input", function () {
  const bill = Number(this.value) || 0;

  const discount = bill * 0.05;
  const net = bill - discount;
  const reward = Math.floor(net / 5000) * 250;

  document.getElementById("calcBox").innerHTML = `
    Discount: ₹${discount.toFixed(0)} <br>
    Net Amount: ₹${net.toFixed(0)} <br>
    Reward: ₹${reward}
  `;
});


// 🔍 Validation
function validateForm(data) {
  if (!data.referralCode) return "Enter referral code";
  if (!data.customerName) return "Enter customer name";
  if (!data.customerPhone.match(/^[0-9]{10}$/)) return "Enter valid 10 digit phone";
  if (!data.billAmount || data.billAmount <= 0) return "Enter valid bill amount";
  if (!data.billNumber) return "Enter bill number";
  return null;
}


// 🚀 Submit Function
function submitForm() {
  const data = {
    referralCode: document.getElementById("code").value.trim(),
    customerName: document.getElementById("name").value.trim(),
    customerPhone: document.getElementById("phone").value.trim(),
    billAmount: document.getElementById("bill").value,
    billNumber: document.getElementById("billNo").value.trim()
  };

  const error = validateForm(data);
  if (error) {
    showResult(error, false);
    return;
  }

  document.getElementById("loading").style.display = "block";

  fetch(SCRIPT_URL, {
    method: "POST",
    body: JSON.stringify(data)
  })
  .then(res => res.json())
  .then(res => {
    document.getElementById("loading").style.display = "none";

    if (res.status === "Success") {
      showResult(`
        ✅ Success <br><br>
        Reward: ₹${res.reward} <br>
        New Customer Code:<br><b>${res.newCustomerCode}</b>
      `, true);

      clearForm();

    } else {
      showResult("❌ " + res.message, false);
    }
  })
  .catch(() => {
    document.getElementById("loading").style.display = "none";
    showResult("Server error. Try again.", false);
  });
}


// 🎯 Show Result
function showResult(message, isSuccess) {
  const div = document.getElementById("result");
  div.className = "result " + (isSuccess ? "success" : "error");
  div.innerHTML = message;
}


// 🔄 Clear Form
function clearForm() {
  document.getElementById("code").value = "";
  document.getElementById("name").value = "";
  document.getElementById("phone").value = "";
  document.getElementById("bill").value = "";
  document.getElementById("billNo").value = "";

  document.getElementById("calcBox").innerHTML = `
    Discount: ₹0 <br>
    Net Amount: ₹0 <br>
    Reward: ₹0
  `;
}
</script>

</body>
</html>
