<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAVRA Referral</title>
</head>
<body>

<h2>SAVRA Referral</h2>

<input id="code" placeholder="Referral Code">
<div id="referrer">Referrer: -</div>

<input id="name" placeholder="Customer Name">
<input id="phone" placeholder="Phone">
<input id="bill" placeholder="Bill Amount" type="number">
<input id="billNo" placeholder="Bill Number">

<div id="calc"></div>

<button onclick="submit()">Submit</button>

<div id="result"></div>

<script>
const URL="https://script.google.com/macros/s/AKfycbzP79KNZn6dBKo5x8B3vOOal4xYLsNyaLt8E_4Anxt_aWsI1wym0ZC2w680VcwZ7fPn/exec";

document.getElementById("code").addEventListener("blur",()=>{
  fetch(URL+"?action=getReferrer&code="+code.value)
  .then(r=>r.json())
  .then(r=>{
    referrer.innerHTML=r.status=="Success"?"Referrer:"+r.name:"Invalid";
  });
});

bill.addEventListener("input",()=>{
  const b=Number(bill.value)||0;
  const d=b*0.05;
  const n=b-d;
  const r=Math.floor(n/5000)*250;
  calc.innerHTML=`Discount:${d} Net:${n} Reward:${r}`;
});

function submit(){
  fetch(URL,{
    method:"POST",
    body:JSON.stringify({
      referralCode:code.value,
      customerName:name.value,
      customerPhone:phone.value,
      billAmount:bill.value,
      billNumber:billNo.value
    })
  })
  .then(r=>r.json())
  .then(r=>{
    result.innerHTML=r.status=="Success"?
      `Reward:${r.reward}<br>New Code:${r.newCustomerCode}`:
      r.message;
  });
}
</script>

</body>
</html>
